[env:m5atoms3]
platform = espressif32
board = m5stack-atoms3
framework = arduino

monitor_speed = 115200
upload_speed = 115200

lib_deps =  
      m5stack/M5Unified
      workloads/SCServo


build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
upload_port = /dev/cu.usbmodem12301
monitor_port = /dev/cu.usbmodem12301